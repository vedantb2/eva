name: Rebuild Daytona Snapshot

on:
  push:
    branches: [main]

jobs:
  rebuild-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Daytona CLI
        run: |
          curl -sfL -o /usr/local/bin/daytona https://github.com/daytonaio/daytona/releases/latest/download/daytona-linux-amd64
          chmod +x /usr/local/bin/daytona
          daytona version

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg GITHUB_TOKEN=${{ secrets.REPO_GITHUB_TOKEN }} \
            -t eva-snapshot:latest \
            .

      - name: Delete existing snapshot
        continue-on-error: true
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: daytona snapshot delete eva-snapshot

      - name: Push snapshot to Daytona
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: daytona snapshot push eva-snapshot:latest --name eva-snapshot
