name: Rebuild Daytona Snapshot

on:
  push:
    branches: [main]

jobs:
  rebuild-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Daytona CLI
        run: |
          curl -sfL https://download.daytona.io/daytona/install.sh | sudo DAYTONA_PATH=/usr/local/bin bash
          sudo chmod +x /usr/local/bin/daytona
          /usr/local/bin/daytona version

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg GITHUB_TOKEN=${{ secrets.REPO_GITHUB_TOKEN }} \
            -t eva-snapshot:latest \
            .

      - name: Delete existing snapshot
        continue-on-error: true
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: /usr/local/bin/daytona snapshot delete eva-snapshot

      - name: Push snapshot to Daytona
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        run: /usr/local/bin/daytona snapshot push eva-snapshot:latest --name eva-snapshot
