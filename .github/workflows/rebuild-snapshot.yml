name: Rebuild Daytona Snapshot

on:
  workflow_dispatch:
    inputs:
      snapshot_name:
        description: "Daytona snapshot name"
        required: true

jobs:
  rebuild-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Dockerfile
        run: |
          cat > Dockerfile.snapshot <<'EOF'
          FROM node:20-bookworm

          RUN apt-get update && apt-get install -y git curl
          RUN apt-get install -y xvfb xfce4 xfce4-terminal x11vnc novnc dbus-x11 x11-utils \
              libx11-6 libxrandr2 libxext6 libxrender1 libxfixes3 libxss1 libxtst6 libxi6
          RUN apt-get install -y wget gnupg \
              && wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg \
              && echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list \
              && apt-get update && apt-get install -y google-chrome-stable \
              && rm -rf /var/lib/apt/lists/*
          RUN corepack enable
          RUN npm install -g @anthropic-ai/claude-code agent-browser convex
          RUN npx playwright install-deps chromium
          RUN curl -fsSL https://code-server.dev/install.sh | sh

          RUN useradd -m -s /bin/bash eva && mkdir -p /workspace && chown eva:eva /workspace
          USER eva
          RUN npx playwright install chromium
          WORKDIR /workspace

          RUN mkdir -p /home/eva/.claude/plugins/marketplaces
          RUN git clone --depth 1 https://github.com/anthropics/claude-plugins-official.git /home/eva/.claude/plugins/marketplaces/claude-plugins-official
          RUN git clone --depth 1 https://github.com/Dammyjay93/interface-design.git /home/eva/.claude/plugins/marketplaces/Dammyjay93
          RUN echo '{"enabledPlugins":{"frontend-design@claude-plugins-official":true,"interface-design@Dammyjay93":true}}' > /home/eva/.claude/settings.json

          ENV PNPM_HOME=/home/eva/.pnpm
          ENV NODE_PATH=/usr/lib/node_modules
          ENV PATH=$PNPM_HOME:$PATH
          RUN mkdir -p $PNPM_HOME

          COPY --chown=eva:eva . /workspace/repo
          WORKDIR /workspace/repo
          RUN pnpm install
          EOF

          echo "=== Generated Dockerfile ==="
          cat Dockerfile.snapshot

      - name: Install Daytona CLI
        run: |
          curl -sfL -o /usr/local/bin/daytona https://github.com/daytonaio/daytona/releases/download/v0.138.0/daytona-linux-amd64
          chmod +x /usr/local/bin/daytona
          daytona version

      - name: Authenticate Daytona CLI
        run: daytona login --api-key ${{ secrets.DAYTONA_API_KEY }}

      - name: Build Docker image
        run: docker build --platform linux/amd64 -f Dockerfile.snapshot -t ${{ inputs.snapshot_name }}:build .

      - name: Delete existing snapshot
        run: |
          SNAPSHOT_ID=$(daytona snapshot list --format json | jq -r --arg name "${{ inputs.snapshot_name }}" '.[] | select(.name == $name) | .id // empty')
          if [ -n "$SNAPSHOT_ID" ]; then
            echo "Deleting snapshot: $SNAPSHOT_ID"
            daytona snapshot delete "$SNAPSHOT_ID"
          else
            echo "No existing snapshot found"
          fi

      - name: Push snapshot to Daytona
        run: daytona snapshot push ${{ inputs.snapshot_name }}:build --name ${{ inputs.snapshot_name }} --cpu 4 --memory 8 --disk 10
