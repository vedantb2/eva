name: Rebuild E2B Template

on:
  workflow_dispatch:
    inputs:
      template_name:
        description: "E2B template name"
        required: true
      custom_commands:
        description: "JSON array of custom setup commands"
        required: false
        default: "[]"
      custom_env_vars:
        description: "JSON array of {key,value} env var pairs"
        required: false
        default: "[]"

jobs:
  rebuild-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install E2B CLI
        run: npm install -g @e2b/cli

      - name: Generate Dockerfile
        env:
          CUSTOM_ENV_VARS: ${{ inputs.custom_env_vars }}
          CUSTOM_COMMANDS: ${{ inputs.custom_commands }}
        run: |
          cat > Dockerfile.template <<'BASEEOF'
          FROM node:20-bullseye

          RUN apt-get update && apt-get install -y git curl
          RUN corepack enable
          RUN npm install -g @anthropic-ai/claude-code agent-browser convex
          RUN npx playwright install-deps chromium

          RUN useradd -m -s /bin/bash eva && mkdir -p /workspace && chown eva:eva /workspace
          USER eva
          RUN npx playwright install chromium
          WORKDIR /workspace

          RUN mkdir -p /home/eva/.claude/plugins/marketplaces
          RUN git clone --depth 1 https://github.com/anthropics/claude-plugins-official.git /home/eva/.claude/plugins/marketplaces/claude-plugins-official
          RUN git clone --depth 1 https://github.com/Dammyjay93/interface-design.git /home/eva/.claude/plugins/marketplaces/Dammyjay93
          RUN echo '{"enabledPlugins":{"frontend-design@claude-plugins-official":true,"interface-design@Dammyjay93":true}}' > /home/eva/.claude/settings.json

          ENV PNPM_HOME=/home/eva/.pnpm
          ENV NODE_PATH=/usr/lib/node_modules
          ENV PATH=$PNPM_HOME:$PATH
          RUN mkdir -p $PNPM_HOME

          COPY --chown=eva:eva . /workspace/repo
          BASEEOF

          printf '%s' "$CUSTOM_ENV_VARS" | jq -r '.[] | "ENV \(.key)=\(.value | @json)"' >> Dockerfile.template

          printf '%s' "$CUSTOM_COMMANDS" | jq -r '.[] | "RUN \(.)"' >> Dockerfile.template

          cat >> Dockerfile.template <<'TAILEOF'
          WORKDIR /workspace/repo/apps/web
          RUN pnpm install
          TAILEOF

          echo "=== Generated Dockerfile ==="
          cat Dockerfile.template

      - name: Build E2B template
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_ACCESS_TOKEN }}
        run: e2b template build -d Dockerfile.template --name ${{ inputs.template_name }}
