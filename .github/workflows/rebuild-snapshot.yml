name: Rebuild Daytona Snapshot

on:
  push:
    branches: [main]

jobs:
  rebuild-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Daytona CLI
        run: |
          curl -sfL -o /usr/local/bin/daytona https://github.com/daytonaio/daytona/releases/download/v0.138.0/daytona-linux-amd64
          chmod +x /usr/local/bin/daytona
          daytona version

      - name: Authenticate Daytona CLI
        run: daytona login --api-key ${{ secrets.DAYTONA_API_KEY }}

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg GITHUB_TOKEN=${{ secrets.REPO_GITHUB_TOKEN }} \
            -t eva-snapshot:${{ github.sha }} \
            .

      - name: Delete existing snapshot
        run: |
          SNAPSHOT_ID=$(daytona snapshot list --format json | jq -r '.[] | select(.name == "eva-snapshot") | .id // empty')
          if [ -n "$SNAPSHOT_ID" ]; then
            echo "Deleting snapshot: $SNAPSHOT_ID"
            daytona snapshot delete "$SNAPSHOT_ID"
          else
            echo "No existing eva-snapshot found"
          fi

      - name: Push snapshot to Daytona
        run: daytona snapshot push eva-snapshot:${{ github.sha }} --name eva-snapshot
